spring:
  application:
    name: FitTracker

  # Schema is owned by Liquibase on both profiles (see ADR-0002).
  # ddl-auto: validate makes the app refuse to start if entities and
  # the Liquibase-managed schema diverge — catches forgotten changelogs.
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.yaml

  # Default profile: H2 in-memory for quick local dev without Docker
  datasource:
    url: jdbc:h2:mem:fittracker;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080

# CORS: allow React frontend during development
app:
  cors:
    allowed-origins: http://localhost:5173

---

# Docker profile: PostgreSQL
spring:
  config:
    activate:
      on-profile: docker

  datasource:
    url: jdbc:postgresql://localhost:5432/fittracker
    driver-class-name: org.postgresql.Driver
    username: fittracker
    password: fittracker

  h2:
    console:
      enabled: false

  jpa:
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
