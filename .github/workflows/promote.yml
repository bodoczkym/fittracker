name: Promote develop to main

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release tag in semver form (e.g. v0.2.0). Leave blank to auto-bump patch from latest tag.'
        required: false
        type: string

permissions:
  contents: write

jobs:
  promote:
    name: Promote
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main with full history
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [[ -n "$INPUT_VERSION" ]]; then
            RESOLVED="$INPUT_VERSION"
            echo "Using explicit version: $RESOLVED"
          else
            LATEST=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n1)
            if [[ -z "$LATEST" ]]; then
              echo "::error::No existing semver tag to bump from. Pass version input explicitly for first release."
              exit 1
            fi
            IFS='.' read -r MAJOR MINOR PATCH <<< "${LATEST#v}"
            RESOLVED="v${MAJOR}.${MINOR}.$((PATCH + 1))"
            echo "Auto-bumped from $LATEST to $RESOLVED"
          fi
          echo "VERSION=$RESOLVED" >> "$GITHUB_ENV"

      - name: Validate version format
        run: |
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Version must match vMAJOR.MINOR.PATCH (got: $VERSION)"
            exit 1
          fi

      - name: Configure git identity
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Refuse if tag already exists
        run: |
          if git rev-parse "refs/tags/$VERSION" >/dev/null 2>&1; then
            echo "::error::Tag $VERSION already exists"
            exit 1
          fi

      - name: Fast-forward main to develop
        run: |
          git fetch origin develop:develop
          if ! git merge --ff-only develop; then
            echo "::error::main cannot be fast-forwarded to develop. Resolve manually (main may have commits develop does not)."
            exit 1
          fi

      - name: Tag release
        run: git tag -a "$VERSION" -m "Release $VERSION"

      - name: Push main and tag
        run: |
          git push origin main
          git push origin "$VERSION"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$VERSION" \
            --target main \
            --title "$VERSION" \
            --generate-notes
